name: Test and Coverage

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Hatch and dependencies via Makefile
        run: |
          pip install hatch
          make install

      - name: Run full quality checks
        run: make check-all

      - name: Verify coverage output
        run: ls -lh coverage.xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.10' && github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          verbose: true
          fail_ci_if_error: false
        env:
          CODECOV_RETRIES: 3

  langgraph-min:
    name: langgraph compat (min supported)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python 3.10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.10"

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,azure-blob,azure-table]"

      - name: Pin langgraph to minimum supported (1.0.0)
        run: pip install "langgraph==1.0.0"

      - name: Show resolved versions
        run: pip show langgraph langgraph-sdk | grep -E '^(Name|Version):'

      - name: Run tests against minimum langgraph
        run: pytest tests/ --no-cov -q
